		678571732F72C7C800F50F9F /* PBXBuildRule */ = {
			isa = PBXBuildRule;
			compilerSpec = com.apple.compilers.proxy.script;
			filePatterns = "*.ispc";
			fileType = pattern.proxy;
			outputFiles = (
				"$(PER_ARCH_OBJECT_FILE_DIR)/$(INPUT_FILE_BASE).o",
			);
			script = (
				"#!/bin/bash",
				"",
				"#env",
				"if [[ \"$CONFIGURATION\" == \"Debug\" ]]; then",
				"ISPCFLAG=\"-g -O0\"",
				"else",
				"ISPCFLAG=-O3",
				"fi",
				"",
				"if [[ \"$ARCHS\" == *\"arm64\"* ]]; then",
				"echo ${SRCROOT}/dependencies/bin/ispc ${ISPCFLAG}  --darwin-version-min=11.0 --target-os=macos --target=neon-i32x8 --arch=aarch64 -o ${OBJECT_FILE_DIR_normal}/arm64/${INPUT_FILE_BASE}.o $SCRIPT_INPUT_FILE ",
				"mkdir -p ${OBJECT_FILE_DIR_normal}/arm64/",
				"${SRCROOT}/dependencies/bin/ispc ${ISPCFLAG} --darwin-version-min=11.0 --target-os=macos --target=neon-i32x8 --arch=aarch64 -o ${OBJECT_FILE_DIR_normal}/arm64/${INPUT_FILE_BASE}.o $SCRIPT_INPUT_FILE ",
				"fi",
				"if [[ \"$ARCHS\" == *\"x86_64\"* ]]; then",
				"mkdir -p ${OBJECT_FILE_DIR_normal}/x86_64/",
				"${SRCROOT}/dependencies/bin/ispc ${ISPCFLAG} --darwin-version-min=11.0 --target-os=macos --target=avx2-i32x16 --target=avx1-i32x16  --target=sse4.2-i32x8 --target=sse2-i32x8 --arch=x86_64 --pic -o ${OBJECT_FILE_DIR_normal}/x86_64/${INPUT_FILE_BASE}.o $SCRIPT_INPUT_FILE ",
				"fi",
				"",
				"bn=$(basename \"$SCRIPT_INPUT_FILE\")",
				"dn=$(dirname \"$SCRIPT_INPUT_FILE\")",
				"tn=\"${dn}/.new${arch}${bn}.h\"",
				"echo \"Output new header to ${tn}\"",
				"",
				"${SRCROOT}/dependencies/bin/ispc --target-os=macos --target=avx2-i32x16 --target=avx1-i32x16 --arch=x86_64 -h \"${tn}\" \"$SCRIPT_INPUT_FILE\"",
				"if [ -f \"$tn\" ]; then",
				"    sed -i '' '/.ispc.h/d' \"${tn}\" ",
				"",
				"    if ! diff -q \"${tn}\" \"$SCRIPT_INPUT_FILE.h\" >/dev/null; then",
				"      mv -f \"${tn}\"  \"$SCRIPT_INPUT_FILE.h\"",
				"    else",
				"      rm -f \"${tn}\" ",
				"    fi",
				"else",
				"    echo \"    Did not create $tn.  Skipping.\"",
				"fi",
				"",
			);
		};
/* End PBXBuildRule section */

